# ── Helper template reference ─────────────────────────────────────────────────
# All services share the same envFrom (Secret + ConfigMap).
# Each Deployment references the image built with --build-arg PROJECT=<name>.
# Replace <ACR_NAME> with your Azure Container Registry name.
# ─────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════════════
# CveNet.Orchestrator
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cvenet-orchestrator
  namespace: cvenet
  labels:
    app: cvenet-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cvenet-orchestrator
  template:
    metadata:
      labels:
        app: cvenet-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: cvenetacr-gda7dkfpcahjgtgg.azurecr.io/cvenet-orchestrator:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: cvenet-secrets
            - configMapRef:
                name: cvenet-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: cvenet-orchestrator-svc
  namespace: cvenet
spec:
  selector:
    app: cvenet-orchestrator
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer   # Expose orchestrator externally; agents use ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cvenet-orchestrator-hpa
  namespace: cvenet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cvenet-orchestrator
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

