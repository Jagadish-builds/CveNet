<svg viewBox="0 0 760 870" width="760" height="870" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Inter','Segoe UI',system-ui,-apple-system,sans-serif; }

      @keyframes flow { to { stroke-dashoffset: -24; } }
      .flow { stroke-dasharray: 8 5; animation: flow 1s linear infinite; }

      @keyframes flowSlow { to { stroke-dashoffset: -20; } }
      .flow-slow { stroke-dasharray: 5 5; animation: flowSlow 1.6s linear infinite; }

      @keyframes pulseGlow {
        0%, 100% { stroke-width: 1.5; opacity: 1; }
        50%      { stroke-width: 2.5; opacity: 0.7; }
      }
      .pulse { animation: pulseGlow 2.4s ease-in-out infinite; }

      @keyframes dotPulse {
        0%, 100% { opacity: 0.25; }
        50%      { opacity: 1; }
      }
      .dot-pulse { animation: dotPulse 1.6s ease-in-out infinite; }

      @keyframes travel {
        0%   { offset-distance: 0%;   opacity: 0; }
        8%   { opacity: 1; }
        92%  { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      .particle {
        animation-name: travel;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        offset-rotate: 0deg;
      }
    </style>

    <marker id="m-purple" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1 L7,4 L0,7Z" fill="#8B6FE8"/></marker>
    <marker id="m-teal"   viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1 L7,4 L0,7Z" fill="#2DD4BF"/></marker>
    <marker id="m-coral"  viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1 L7,4 L0,7Z" fill="#F97060"/></marker>
    <marker id="m-amber"  viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1 L7,4 L0,7Z" fill="#F5A623"/></marker>
    <marker id="m-blue"   viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1 L7,4 L0,7Z" fill="#3B9EF5"/></marker>
    <marker id="m-green"  viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1 L7,4 L0,7Z" fill="#4ADE80"/></marker>
    <marker id="m-gray"   viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1 L7,4 L0,7Z" fill="#8899AA"/></marker>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="760" height="870" fill="#07090F" rx="14"/>

  <!-- ═══ HEADER ═══ -->
  <rect x="240" y="10" width="280" height="26" rx="13" fill="#0C1A2E" stroke="#3D2E7A"/>
  <circle cx="257" cy="23" r="3" fill="#8B6FE8"/>
  <text x="380" y="27" text-anchor="middle" fill="#8B6FE8" font-size="9" letter-spacing="3">C# &#183; AKS &#183; AZURE OPENAI &#183; RAG</text>

  <text x="380" y="68" text-anchor="middle" fill="#E2EAF4" font-size="28" font-weight="800" letter-spacing="-0.5">CveNet</text>
  <text x="380" y="92" text-anchor="middle" fill="#4A6080" font-size="11">Multi-agent CVE analysis &#183; animated request flow</text>

  <!-- ═══ USER QUERY ═══ -->
  <rect x="280" y="110" width="200" height="48" rx="8" fill="#111520" stroke="#1C2535"/>
  <rect x="280" y="110" width="200" height="3" rx="1.5" fill="#8899AA"/>
  <text x="380" y="132" text-anchor="middle" fill="#8899AA" font-size="12" font-weight="700">User Query</text>
  <text x="380" y="148" text-anchor="middle" fill="#4A6080" font-size="9">Natural language security question</text>

  <!-- Edge: User -> Orchestrator -->
  <path d="M380,158 L380,200" stroke="#8899AA" stroke-width="1.5" fill="none" class="flow-slow" marker-end="url(#m-gray)"/>

  <!-- ═══ AKS BOUNDARY ═══ -->
  <rect x="20" y="170" width="720" height="410" rx="12" fill="none" stroke="#1E2E42" stroke-width="1" stroke-dasharray="7 4"/>
  <text x="36" y="190" fill="#1E2E42" font-size="10" letter-spacing="2">&#9784;  AKS CLUSTER &#183; namespace: cvenet</text>

  <!-- ═══ ORCHESTRATOR ═══ -->
  <rect x="160" y="200" width="440" height="56" rx="8" fill="#111520" stroke="#8B6FE8" stroke-width="1.5" class="pulse"/>
  <rect x="160" y="200" width="440" height="3" rx="1.5" fill="#8B6FE8"/>
  <text x="380" y="224" text-anchor="middle" fill="#8B6FE8" font-size="13" font-weight="700">CveNetOrchestrator</text>
  <text x="380" y="242" text-anchor="middle" fill="#4A6080" font-size="9.5">Routes &#183; fans out &#183; converges &#183; ASP.NET Core &#183; AKS</text>

  <!-- ═══ FAN-OUT EDGES ═══ -->
  <path id="e-pp" d="M230,256 Q187.5,258 145,300" stroke="#2DD4BF" stroke-width="1.5" fill="none" class="flow" marker-end="url(#m-teal)"/>
  <path id="e-cs" d="M380,256 Q385,278 390,300" stroke="#F97060" stroke-width="1.5" fill="none" class="flow" marker-end="url(#m-coral)"/>
  <path id="e-pr" d="M530,256 Q577.5,258 625,300" stroke="#F5A623" stroke-width="1.5" fill="none" class="flow" marker-end="url(#m-amber)"/>

  <!-- Pulsing dot trio + label -->
  <circle cx="380" cy="266" r="3" fill="#F97060" class="dot-pulse" style="animation-delay:0s"/>
  <circle cx="380" cy="274" r="3" fill="#F5A623" class="dot-pulse" style="animation-delay:0.3s"/>
  <circle cx="380" cy="282" r="3" fill="#2DD4BF" class="dot-pulse" style="animation-delay:0.6s"/>
  <text x="380" y="296" text-anchor="middle" fill="#4A6080" font-size="8" letter-spacing="2">PARALLEL FAN-OUT</text>

  <!-- ═══ AGENT ROW ═══ -->
  <rect x="40" y="300" width="210" height="64" rx="8" fill="#111520" stroke="#1C2535"/>
  <rect x="40" y="300" width="210" height="3" rx="1.5" fill="#2DD4BF"/>
  <text x="145" y="326" text-anchor="middle" fill="#2DD4BF" font-size="12" font-weight="700">PromptParser Agent</text>
  <text x="145" y="344" text-anchor="middle" fill="#4A6080" font-size="9">Intent &#183; keywords &#183; CVE IDs &#183; severity</text>

  <rect x="270" y="300" width="240" height="64" rx="8" fill="#111520" stroke="#1C2535"/>
  <rect x="270" y="300" width="240" height="3" rx="1.5" fill="#F97060"/>
  <text x="390" y="326" text-anchor="middle" fill="#F97060" font-size="12" font-weight="700">CveSearch Agent</text>
  <text x="390" y="344" text-anchor="middle" fill="#4A6080" font-size="9">RAG &#183; hybrid search &#183; Azure AI Search</text>

  <rect x="530" y="300" width="190" height="64" rx="8" fill="#111520" stroke="#1C2535"/>
  <rect x="530" y="300" width="190" height="3" rx="1.5" fill="#F5A623"/>
  <text x="625" y="326" text-anchor="middle" fill="#F5A623" font-size="12" font-weight="700">Prioritization Agent</text>
  <text x="625" y="344" text-anchor="middle" fill="#4A6080" font-size="9">CVSS &#183; recency &#183; severity &#183; no LLM</text>

  <!-- ═══ CONVERGE EDGES ═══ -->
  <path id="e-pr-rep" d="M145,364 Q182.5,397 220,430" stroke="#2DD4BF" stroke-width="1.5" fill="none" class="flow" marker-end="url(#m-teal)"/>
  <path id="e-cs-rep" d="M390,364 Q385,397 380,430" stroke="#F97060" stroke-width="1.5" fill="none" class="flow" marker-end="url(#m-coral)"/>
  <path id="e-pri-rep" d="M625,364 Q582.5,377 540,430" stroke="#F5A623" stroke-width="1.5" fill="none" class="flow" marker-end="url(#m-amber)"/>
  <text x="380" y="404" text-anchor="middle" fill="#4A6080" font-size="8" letter-spacing="2">CONVERGE</text>

  <!-- ═══ REPORT AGENT ═══ -->
  <rect x="160" y="430" width="440" height="64" rx="8" fill="#111520" stroke="#8B6FE8" stroke-width="1.5" class="pulse"/>
  <rect x="160" y="430" width="440" height="3" rx="1.5" fill="#8B6FE8"/>
  <text x="380" y="458" text-anchor="middle" fill="#8B6FE8" font-size="13" font-weight="700">Report Agent</text>
  <text x="380" y="478" text-anchor="middle" fill="#4A6080" font-size="9.5">Executive summary &#183; risk ranking &#183; Task.WhenAll</text>
  <text x="186" y="514" fill="#F97060" font-size="10" font-weight="700">RAG</text>

  <!-- ═══ AZURE SHARED SERVICES BAND ═══ -->
  <rect x="20" y="600" width="720" height="110" rx="10" fill="#3B9EF508" stroke="#3B9EF530" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="36" y="618" fill="#3B9EF566" font-size="9" letter-spacing="2">AZURE SHARED SERVICES</text>

  <!-- Cross edges into Azure services (drawn before boxes so they tuck under) -->
  <path id="e-rep-search" d="M160,462 Q150,546 140,630" stroke="#F97060" stroke-width="2" fill="none" stroke-dasharray="5 4" class="flow-slow" marker-end="url(#m-coral)"/>
  <path id="e-rep-openai" d="M380,494 Q385,562 390,630" stroke="#3B9EF5" stroke-width="1.5" fill="none" stroke-dasharray="5 4" class="flow-slow" marker-end="url(#m-blue)"/>
  <path id="e-rep-blob" d="M600,462 Q615,546 630,630" stroke="#8899AA" stroke-width="1.5" fill="none" stroke-dasharray="5 4" class="flow-slow" marker-end="url(#m-gray)"/>
  <path id="e-pp-openai" d="M145,364 Q207.5,469.5 270,655" stroke="#3B9EF5" stroke-width="1.5" fill="none" stroke-dasharray="5 4" opacity="0.6" marker-end="url(#m-blue)"/>

  <!-- Green edge: Report -> AnalysisResponse (passes behind Azure OpenAI box) -->
  <path id="e-rep-response" d="M380,494 L380,750" stroke="#4ADE80" stroke-width="1.5" fill="none" class="flow" marker-end="url(#m-green)"/>

  <!-- ═══ AZURE SERVICE BOXES ═══ -->
  <rect x="40" y="630" width="200" height="50" rx="8" fill="#111520" stroke="#1C2535"/>
  <rect x="40" y="630" width="200" height="3" rx="1.5" fill="#2DD4BF"/>
  <text x="140" y="654" text-anchor="middle" fill="#2DD4BF" font-size="12" font-weight="700">Azure AI Search</text>
  <text x="140" y="672" text-anchor="middle" fill="#4A6080" font-size="9">NVD CVE index &#183; hybrid retrieval</text>

  <rect x="270" y="630" width="240" height="50" rx="8" fill="#111520" stroke="#1C2535"/>
  <rect x="270" y="630" width="240" height="3" rx="1.5" fill="#3B9EF5"/>
  <text x="390" y="654" text-anchor="middle" fill="#3B9EF5" font-size="12" font-weight="700">Azure OpenAI</text>
  <text x="390" y="672" text-anchor="middle" fill="#4A6080" font-size="9">gpt-4.1-mini &#183; shared across agents</text>

  <rect x="540" y="630" width="180" height="50" rx="8" fill="#111520" stroke="#1C2535"/>
  <rect x="540" y="630" width="180" height="3" rx="1.5" fill="#8899AA"/>
  <text x="630" y="654" text-anchor="middle" fill="#8899AA" font-size="12" font-weight="700">Azure Blob Storage</text>
  <text x="630" y="672" text-anchor="middle" fill="#4A6080" font-size="9">Report persistence &#183; optional</text>

  <!-- ═══ ANALYSIS RESPONSE ═══ -->
  <rect x="280" y="750" width="200" height="48" rx="8" fill="#111520" stroke="#1C2535"/>
  <rect x="280" y="750" width="200" height="3" rx="1.5" fill="#4ADE80"/>
  <text x="380" y="772" text-anchor="middle" fill="#4ADE80" font-size="12" font-weight="700">AnalysisResponse</text>
  <text x="380" y="788" text-anchor="middle" fill="#4A6080" font-size="9">Structured JSON &#183; HTTP 200</text>

  <!-- ═══ PARTICLES (traveling dots) ═══ -->
  <circle r="3" fill="#8899AA" class="particle" style="offset-path: path('M380,158 L380,200'); animation-duration:1.8s; animation-delay:0s; filter:drop-shadow(0 0 4px #8899AA)"/>

  <circle r="3" fill="#2DD4BF" class="particle" style="offset-path: path('M230,256 Q187.5,258 145,300'); animation-duration:2.2s; animation-delay:0.1s; filter:drop-shadow(0 0 4px #2DD4BF)"/>
  <circle r="3" fill="#F97060" class="particle" style="offset-path: path('M380,256 Q385,278 390,300'); animation-duration:2.2s; animation-delay:0.5s; filter:drop-shadow(0 0 4px #F97060)"/>
  <circle r="3" fill="#F5A623" class="particle" style="offset-path: path('M530,256 Q577.5,258 625,300'); animation-duration:2.2s; animation-delay:0.9s; filter:drop-shadow(0 0 4px #F5A623)"/>

  <circle r="3" fill="#2DD4BF" class="particle" style="offset-path: path('M145,364 Q182.5,397 220,430'); animation-duration:2.4s; animation-delay:1.3s; filter:drop-shadow(0 0 4px #2DD4BF)"/>
  <circle r="3" fill="#F97060" class="particle" style="offset-path: path('M390,364 Q385,397 380,430'); animation-duration:2.4s; animation-delay:1.7s; filter:drop-shadow(0 0 4px #F97060)"/>
  <circle r="3" fill="#F5A623" class="particle" style="offset-path: path('M625,364 Q582.5,377 540,430'); animation-duration:2.4s; animation-delay:2.1s; filter:drop-shadow(0 0 4px #F5A623)"/>

  <circle r="4" fill="#F97060" class="particle" style="offset-path: path('M160,462 Q150,546 140,630'); animation-duration:2.8s; animation-delay:0.3s; filter:drop-shadow(0 0 5px #F97060)"/>
  <circle r="3" fill="#3B9EF5" class="particle" style="offset-path: path('M380,494 Q385,562 390,630'); animation-duration:2.8s; animation-delay:0.9s; filter:drop-shadow(0 0 4px #3B9EF5)"/>
  <circle r="3" fill="#8899AA" class="particle" style="offset-path: path('M600,462 Q615,546 630,630'); animation-duration:2.8s; animation-delay:1.5s; filter:drop-shadow(0 0 4px #8899AA)"/>
  <circle r="3" fill="#3B9EF5" class="particle" style="offset-path: path('M145,364 Q207.5,469.5 270,655'); animation-duration:3.2s; animation-delay:0.6s; filter:drop-shadow(0 0 4px #3B9EF5)"/>

  <circle r="3" fill="#4ADE80" class="particle" style="offset-path: path('M380,494 L380,750'); animation-duration:2.6s; animation-delay:0.4s; filter:drop-shadow(0 0 4px #4ADE80)"/>

  <!-- ═══ LEGEND ═══ -->
  <g font-size="9" fill="#4A6080">
    <rect x="60" y="828" width="18" height="2" rx="1" fill="#8B6FE8"/>
    <text x="84" y="833">Orchestration</text>

    <rect x="190" y="828" width="18" height="2" rx="1" fill="#2DD4BF"/>
    <text x="214" y="833">PromptParser</text>

    <rect x="320" y="828" width="18" height="2" rx="1" fill="#F97060"/>
    <text x="344" y="833">CveSearch + RAG</text>

    <rect x="470" y="828" width="18" height="2" rx="1" fill="#F5A623"/>
    <text x="494" y="833">Prioritization</text>

    <rect x="600" y="828" width="18" height="2" rx="1" fill="#3B9EF5"/>
    <text x="624" y="833">Azure OpenAI</text>

    <rect x="320" y="850" width="18" height="2" rx="1" fill="#4ADE80"/>
    <text x="344" y="855">Response</text>
  </g>
</svg>
