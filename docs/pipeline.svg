<svg viewBox="0 0 880 490" width="880" height="490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

      @keyframes flow {
        to { stroke-dashoffset: -40; }
      }
      @keyframes flowSlow {
        to { stroke-dashoffset: -36; }
      }
      @keyframes orchPulse {
        0%, 100% { stroke-width: 2.5; opacity: 1; }
        50%       { stroke-width: 4;   opacity: 0.75; }
      }
      @keyframes agentActive {
        0%, 100% { stroke-opacity: 0.55; }
        50%      { stroke-opacity: 1; }
      }
      @keyframes dotMove1 {
        0%   { offset-distance: 0%;   opacity: 0; }
        5%   { opacity: 1; }
        45%  { opacity: 1; }
        55%  { offset-distance: 100%; opacity: 0; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes dotMove2 {
        0%, 20%  { offset-distance: 0%;   opacity: 0; }
        25%  { opacity: 1; }
        65%  { opacity: 1; }
        75%  { offset-distance: 100%; opacity: 0; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes dotMove3 {
        0%, 40%  { offset-distance: 0%;   opacity: 0; }
        45%  { opacity: 1; }
        82%  { opacity: 1; }
        90%  { offset-distance: 100%; opacity: 0; }
        100% { offset-distance: 100%; opacity: 0; }
      }

      .flow-main { stroke-dasharray: 9 5; animation: flow 1.1s linear infinite; }
      .flow-side { stroke-dasharray: 5 5; animation: flowSlow 1.8s linear infinite; }
      .orch-rect { animation: orchPulse 2.2s ease-in-out infinite; }
      .a1 { animation: agentActive 4s ease-in-out 0.0s infinite; }
      .a2 { animation: agentActive 4s ease-in-out 1.0s infinite; }
      .a3 { animation: agentActive 4s ease-in-out 2.0s infinite; }
      .a4 { animation: agentActive 4s ease-in-out 3.0s infinite; }
    </style>

    <!-- Arrowheads -->
    <marker id="mg" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,1 L7,4 L0,7Z" fill="#3fb950"/>
    </marker>
    <marker id="mp" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,1 L7,4 L0,7Z" fill="#a371f7"/>
    </marker>
    <marker id="mb" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,1 L7,4 L0,7Z" fill="#388bfd"/>
    </marker>
    <marker id="mb-dim" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,1 L7,4 L0,7Z" fill="#388bfd" opacity="0.45"/>
    </marker>

    <!-- Soft glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="880" height="490" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="440" y="33" text-anchor="middle" fill="#c9d1d9"
        font-size="15" font-weight="600" letter-spacing="0.4">
    CveNet — Multi-Agent CVE Analysis Pipeline
  </text>

  <!-- AKS bounding box -->
  <rect x="158" y="50" width="678" height="410" rx="10"
        fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="170" y="65" fill="#484f58" font-size="10">
    ☸  Azure Kubernetes Service  ·  namespace: cvenet
  </text>

  <!-- Azure services panel -->
  <rect x="648" y="70" width="180" height="380" rx="8"
        fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="660" y="85" fill="#484f58" font-size="9">☁  Azure AI Services</text>

  <!-- ═══ NODES ═══ -->

  <!-- User -->
  <rect x="18" y="198" width="115" height="54" rx="8"
        fill="#162016" stroke="#3fb950" stroke-width="2"/>
  <text x="75" y="220" text-anchor="middle" fill="#3fb950"
        font-size="13" font-weight="600">👤 User</text>
  <text x="75" y="238" text-anchor="middle" fill="#7d8590" font-size="10">POST /analyze</text>

  <!-- Orchestrator (glowing center) -->
  <rect x="168" y="172" width="152" height="94" rx="8"
        fill="#162016" stroke="#3fb950" stroke-width="2.5"
        class="orch-rect" filter="url(#glow)"/>
  <text x="244" y="197" text-anchor="middle" fill="#3fb950"
        font-size="13" font-weight="700">🎯 Orchestrator</text>
  <text x="244" y="215" text-anchor="middle" fill="#7d8590" font-size="10">Entry point</text>
  <text x="244" y="230" text-anchor="middle" fill="#7d8590" font-size="10">LoadBalancer :8080</text>
  <text x="244" y="248" text-anchor="middle" fill="#484f58" font-size="9">pipeline coordinator</text>

  <!-- PromptParser -->
  <rect x="424" y="66" width="162" height="68" rx="8"
        fill="#1a1a2e" stroke="#a371f7" stroke-width="2" class="a1"/>
  <text x="505" y="90" text-anchor="middle" fill="#a371f7"
        font-size="13" font-weight="600">🧠 PromptParser</text>
  <text x="505" y="107" text-anchor="middle" fill="#7d8590" font-size="10">Intent classification</text>
  <text x="505" y="123" text-anchor="middle" fill="#7d8590" font-size="10">Keyword extraction</text>

  <!-- CveSearch -->
  <rect x="424" y="163" width="162" height="68" rx="8"
        fill="#1a1a2e" stroke="#a371f7" stroke-width="2" class="a2"/>
  <text x="505" y="186" text-anchor="middle" fill="#a371f7"
        font-size="13" font-weight="600">🔍 CveSearch</text>
  <text x="505" y="203" text-anchor="middle" fill="#7d8590" font-size="10">RAG retrieval</text>
  <text x="505" y="219" text-anchor="middle" fill="#7d8590" font-size="10">Azure AI Search</text>

  <!-- Prioritization -->
  <rect x="424" y="260" width="162" height="68" rx="8"
        fill="#1a1a2e" stroke="#a371f7" stroke-width="2" class="a3"/>
  <text x="505" y="283" text-anchor="middle" fill="#a371f7"
        font-size="13" font-weight="600">⚖️ Prioritization</text>
  <text x="505" y="300" text-anchor="middle" fill="#7d8590" font-size="10">CVSS + recency</text>
  <text x="505" y="316" text-anchor="middle" fill="#7d8590" font-size="10">Composite scoring</text>

  <!-- Report -->
  <rect x="424" y="357" width="162" height="68" rx="8"
        fill="#1a1a2e" stroke="#a371f7" stroke-width="2" class="a4"/>
  <text x="505" y="380" text-anchor="middle" fill="#a371f7"
        font-size="13" font-weight="600">📄 Report</text>
  <text x="505" y="397" text-anchor="middle" fill="#7d8590" font-size="10">Executive summary</text>
  <text x="505" y="413" text-anchor="middle" fill="#7d8590" font-size="10">Recommendations</text>

  <!-- Azure OpenAI -->
  <rect x="658" y="92" width="162" height="54" rx="6"
        fill="#0d1b2a" stroke="#388bfd" stroke-width="1.5"/>
  <text x="739" y="114" text-anchor="middle" fill="#388bfd"
        font-size="11" font-weight="600">🤖 Azure OpenAI</text>
  <text x="739" y="131" text-anchor="middle" fill="#7d8590" font-size="10">gpt-35-turbo</text>

  <!-- Azure AI Search -->
  <rect x="658" y="174" width="162" height="54" rx="6"
        fill="#0d1b2a" stroke="#388bfd" stroke-width="1.5"/>
  <text x="739" y="196" text-anchor="middle" fill="#388bfd"
        font-size="11" font-weight="600">🗂️ Azure AI Search</text>
  <text x="739" y="213" text-anchor="middle" fill="#7d8590" font-size="10">cvenet-index (RAG)</text>

  <!-- Blob Storage -->
  <rect x="658" y="357" width="162" height="54" rx="6"
        fill="#0d1b2a" stroke="#388bfd" stroke-width="1.5"/>
  <text x="739" y="379" text-anchor="middle" fill="#388bfd"
        font-size="11" font-weight="600">🪣 Blob Storage</text>
  <text x="739" y="396" text-anchor="middle" fill="#7d8590" font-size="10">cvenet-reports</text>

  <!-- ═══ ARROWS — pipeline flow ═══ -->

  <!-- 1. User → Orchestrator -->
  <path id="p-user-orch" d="M133,225 L168,220"
        stroke="#3fb950" stroke-width="2" fill="none"
        stroke-dasharray="9 5" class="flow-main"
        marker-end="url(#mg)"/>

  <!-- 2. Orchestrator → PromptParser (up-right) -->
  <path id="p-orch-pp" d="M320,197 C368,172 400,130 424,100"
        stroke="#a371f7" stroke-width="1.8" fill="none"
        stroke-dasharray="9 5" class="flow-main"
        marker-end="url(#mp)"/>

  <!-- 3. Orchestrator → CveSearch (right) -->
  <path id="p-orch-cs" d="M320,216 L424,197"
        stroke="#a371f7" stroke-width="1.8" fill="none"
        stroke-dasharray="9 5" class="flow-main"
        marker-end="url(#mp)"/>

  <!-- 4. Orchestrator → Prioritization (down-right) -->
  <path id="p-orch-pri" d="M320,235 C368,252 400,277 424,294"
        stroke="#a371f7" stroke-width="1.8" fill="none"
        stroke-dasharray="9 5" class="flow-main"
        marker-end="url(#mp)"/>

  <!-- 5. Orchestrator → Report (far down-right) -->
  <path id="p-orch-rep" d="M320,248 C360,315 400,360 424,391"
        stroke="#a371f7" stroke-width="1.8" fill="none"
        stroke-dasharray="9 5" class="flow-main"
        marker-end="url(#mp)"/>

  <!-- ═══ ARROWS — Azure service calls (dashed, dimmer) ═══ -->

  <!-- PromptParser → Azure OpenAI -->
  <path d="M586,100 C618,103 638,112 658,119"
        stroke="#388bfd" stroke-width="1.5" fill="none"
        stroke-dasharray="5 5" class="flow-side"
        marker-end="url(#mb)"/>
  <text x="617" y="93" text-anchor="middle" fill="#484f58" font-size="8">LLM call</text>

  <!-- CveSearch → Azure AI Search -->
  <path d="M586,197 L658,201"
        stroke="#388bfd" stroke-width="1.5" fill="none"
        stroke-dasharray="5 5" class="flow-side"
        marker-end="url(#mb)"/>
  <text x="621" y="191" text-anchor="middle" fill="#484f58" font-size="8">RAG query</text>

  <!-- CveSearch → Azure OpenAI (fallback, very dim) -->
  <path d="M586,175 C618,153 640,138 658,132"
        stroke="#388bfd" stroke-width="1" fill="none"
        stroke-dasharray="4 7" opacity="0.4"
        marker-end="url(#mb-dim)"/>
  <text x="614" y="165" text-anchor="middle" fill="#484f58" font-size="8">fallback</text>

  <!-- Report → Azure OpenAI (2 parallel LLM calls) -->
  <path d="M586,378 C615,298 640,210 658,145"
        stroke="#388bfd" stroke-width="1.5" fill="none"
        stroke-dasharray="5 5" class="flow-side"
        marker-end="url(#mb)"/>
  <text x="643" y="272" text-anchor="middle" fill="#484f58" font-size="8">2× parallel</text>
  <text x="643" y="282" text-anchor="middle" fill="#484f58" font-size="8">LLM calls</text>

  <!-- Report → Blob Storage -->
  <path d="M586,398 C618,402 638,394 658,390"
        stroke="#388bfd" stroke-width="1.5" fill="none"
        stroke-dasharray="5 5" class="flow-side"
        marker-end="url(#mb)"/>
  <text x="621" y="415" text-anchor="middle" fill="#484f58" font-size="8">persist</text>

  <!-- ═══ STEP LABELS (numbered pipeline) ═══ -->
  <circle cx="344" cy="168" r="9" fill="#1c2128" stroke="#a371f7" stroke-width="1"/>
  <text x="344" y="172" text-anchor="middle" fill="#a371f7" font-size="8" font-weight="700">1</text>

  <circle cx="352" cy="215" r="9" fill="#1c2128" stroke="#a371f7" stroke-width="1"/>
  <text x="352" y="219" text-anchor="middle" fill="#a371f7" font-size="8" font-weight="700">2</text>

  <circle cx="350" cy="262" r="9" fill="#1c2128" stroke="#a371f7" stroke-width="1"/>
  <text x="350" y="266" text-anchor="middle" fill="#a371f7" font-size="8" font-weight="700">3</text>

  <circle cx="344" cy="308" r="9" fill="#1c2128" stroke="#a371f7" stroke-width="1"/>
  <text x="344" y="312" text-anchor="middle" fill="#a371f7" font-size="8" font-weight="700">4</text>

  <!-- ═══ FOOTER ═══ -->
  <text x="440" y="474" text-anchor="middle" fill="#484f58" font-size="9">
    ~62s end-to-end  ·  2 sequential LLM hops  ·  Report runs executive summary + recommendations in parallel
  </text>
</svg>
